name: Package Artifacts

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  pack:
    name: Pack Library Projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build and pack libraries
        run: ./scripts/pack-libraries.sh

      - name: Summarize package versions
        shell: bash
        run: |
          set -euo pipefail
          echo "Generated packages:" >> "$GITHUB_STEP_SUMMARY"
          ls -1 artifacts/packages/*.nupkg | xargs -n 1 basename >> "$GITHUB_STEP_SUMMARY"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
