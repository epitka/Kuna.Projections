name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch base branch for lint
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ github.base_ref }}" ]; then
            git fetch origin "refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          elif git ls-remote --exit-code --heads origin master >/dev/null 2>&1; then
            git fetch origin "refs/heads/master:refs/remotes/origin/master"
          else
            echo "Could not find origin/master for lint comparison."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Run ReSharper CleanupCode on changed C# files
        shell: bash
        run: |
          set -euo pipefail

          echo "Running ReSharper CleanupCode on changed C# files"
          cd "${GITHUB_WORKSPACE}"
          dotnet tool restore > /dev/null

          PROFILE="Reformat Code"
          LAYERS="--disable-settings-layers=GlobalAll,GlobalPerProduct,SolutionPersonal"
          SETTINGS_FILE="Kuna.Projections.sln.DotSettings"
          EXCLUDE_PATTERN="**/migrations/**"

          if [ -n "${{ github.base_ref }}" ]; then
            echo "Detecting changes in pull request..."
            FILES_TO_CHECK="$(git diff --name-only --diff-filter=ACM "origin/${{ github.base_ref }}...HEAD" | grep -E '\.cs$' || true)"
          else
            echo "Detecting changes in commit..."
            FILES_TO_CHECK="$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD | grep -E '\.cs$' || true)"
          fi

          if [ -z "$FILES_TO_CHECK" ]; then
            echo "No C# files changed. Skipping."
            exit 0
          fi

          FILES_TO_CLEAN=()
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            [[ -f "$file" ]] && FILES_TO_CLEAN+=("$file")
          done <<< "$FILES_TO_CHECK"

          if [ ${#FILES_TO_CLEAN[@]} -eq 0 ]; then
            echo "No C# files to format."
            exit 0
          fi

          echo "Checking ${#FILES_TO_CLEAN[@]} changed C# file(s)"
          echo "=== Files to format ==="
          printf '%s\n' "${FILES_TO_CLEAN[@]}"
          echo ""

          INCLUDE_PATTERN="$(IFS=';'; echo "${FILES_TO_CLEAN[*]}")"

          echo "=== Include pattern ==="
          echo "$INCLUDE_PATTERN"
          echo ""

          echo "=== Verifying configuration files ==="
          ls -la "$SETTINGS_FILE" .editorconfig || true
          echo ""

          set +e
          dotnet jb cleanupcode \
            --profile="$PROFILE" \
            $LAYERS \
            --settings="$SETTINGS_FILE" \
            --exclude="$EXCLUDE_PATTERN" \
            --include="$INCLUDE_PATTERN" \
            --verbosity=ERROR \
            --no-build \
            Kuna.Projections.sln
          exit_code=$?
          set -e

          if [[ $exit_code -ne 0 && $exit_code -ne 3 ]]; then
            echo "CleanupCode failed with exit code $exit_code"
            exit $exit_code
          fi

          ALL_MODIFIED="$(git diff --name-only)"

          echo "=== Files modified by cleanupcode ==="
          if [ -z "$ALL_MODIFIED" ]; then
            echo "(none)"
          else
            echo "$ALL_MODIFIED"
          fi

          echo ""
          MR_FILES_MODIFIED=()
          if [ -n "$ALL_MODIFIED" ]; then
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              if printf '%s\n' "${FILES_TO_CLEAN[@]}" | grep -qx "$file"; then
                MR_FILES_MODIFIED+=("$file")
              fi
            done <<< "$ALL_MODIFIED"
          fi

          if [ ${#MR_FILES_MODIFIED[@]} -gt 0 ]; then
            echo "Code formatting issues detected in the following changed files:"
            printf '%s\n' "${MR_FILES_MODIFIED[@]}"
            echo ""
            echo "=== Showing diff for formatting issues ==="
            git diff --stat
            echo ""
            echo "=== First 50 lines of changes ==="
            git diff | head -50 || true
            echo ""
            echo "Please run lint locally before pushing:"
            echo ""
            echo "    make lint"
            echo ""
            exit 1
          else
            echo "All changed C# files are properly formatted."
          fi

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs:
      - lint

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build and run unit tests
        run: ./scripts/build-and-test.sh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: artifacts/test-results/*.trx
