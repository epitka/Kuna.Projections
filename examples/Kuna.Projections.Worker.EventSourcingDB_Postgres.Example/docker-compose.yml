services:
  eventsourcingdb:
    image: thenativeweb/eventsourcingdb:latest
    command:
      - "run"
      - "--api-token=secret"
      - "--data-directory-temporary"
      - "--http-enabled"
      - "--https-enabled=false"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--output-document=/dev/null", "http://localhost:3000/api/v1/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: orders_projection
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
